services:
  rabbitmq:
    image: rabbitmq:4-management
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pasarpixel
      POSTGRES_PASSWORD: pasarpixel
      POSTGRES_DB: pasarpixel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pasarpixel"]
      interval: 5s
      timeout: 5s
      retries: 5



  auth-service:
    build:
      context: ../..
      dockerfile: services/auth-service/Dockerfile
    expose:
      - "3001"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - ../../services/auth-service/.env
    environment:
      DATABASE_URL: postgresql://pasarpixel:pasarpixel@postgres:5432/pasarpixel
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672

  main-api:
    build:
      context: ../..
      dockerfile: services/main-api/Dockerfile
    expose:
      - "3002"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      auth-service:
        condition: service_started
    env_file:
      - ../../services/main-api/.env
    environment:
      DATABASE_URL: postgresql://pasarpixel:pasarpixel@postgres:5432/pasarpixel
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      AUTH_SERVICE_URL: http://auth-service:3001

  notification-service:
    build:
      context: ../..
      dockerfile: services/notification-service/Dockerfile
    expose:
      - "3003"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - ../../services/notification-service/.env
    environment:
      DATABASE_URL: postgresql://pasarpixel:pasarpixel@postgres:5432/pasarpixel
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672

  kong:
    image: kong:3.9
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "8000:8000"
      # WARNING: admin port 8001 is exposed for local dev only.
      # In production: remove this line or restrict to internal network.
      - "8001:8001"
    volumes:
      - ../../gateway/kong:/kong:ro
    depends_on:
      - auth-service
      - main-api
      - notification-service

  client:
    build:
      context: ../../client
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ../../client:/app
      - /app/node_modules
    depends_on:
      - auth-service
    
volumes:
  postgres_data:
  rabbitmq_data:
