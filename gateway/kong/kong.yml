_format_version: "3.0"
_transform: true

services:
  - name: auth-service
    url: http://auth-service:3001
    routes:
      - name: auth-route
        paths:
          - /auth
        strip_path: false

  - name: main-api
    url: http://main-api:3002
    routes:
      - name: profile-route
        paths:
          - /profile
        strip_path: false
      - name: seller-applications-route
        paths:
          - /seller-applications
        strip_path: false
      - name: assets-route
        paths:
          - /assets
        strip_path: false
      - name: cart-route
        paths:
          - /cart
        strip_path: false
      - name: exchange-rate-route
        paths:
          - /exchange-rate
        strip_path: false
      - name: checkout-route
        paths:
          - /checkout
        strip_path: false
      - name: orders-route
        paths:
          - /orders
        strip_path: false
      - name: seller-route
        paths:
          - /seller
        strip_path: false
      - name: logs-route
        paths:
          - /logs
        strip_path: false

  - name: notification-service
    url: http://notification-service:3003
    routes:
      - name: notifications-route
        paths:
          - /notifications
        strip_path: false

plugins:
  - name: cors
    config:
      origins:
        - http://localhost:5173
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
      credentials: true
      max_age: 3600
